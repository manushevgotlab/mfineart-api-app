spring.application.name=mfineart

# Database (H2 for local development)
spring.datasource.url=jdbc:h2:mem:mfineart;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# JWT
jwt.secret=change-me-to-a-secret-key-at-least-32-characters-long-for-hs256
jwt.expiration-ms=86400000

# CORS (Angular dev server and production origin)
app.cors.allowed-origins=http://localhost:4200

# Publish SCHEDULED content when publishAt is reached (every minute)
app.content.scheduled-publish-cron=0 * * * * *

# Default admin user (created on first startup if no users exist)
app.security.default-admin.enabled=true
app.security.default-admin.username=admin
app.security.default-admin.password=changeme

aws.s3.bucketName=your-bucket-name
aws.s3.region=us-east-1
aws.accessKeyId=your-access-key
aws.secretKey=your-secret-key
